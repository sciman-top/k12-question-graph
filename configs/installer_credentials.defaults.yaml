version: "g004.installer-credentials.v1"
mode: "draft_test"
postgresql:
  pgpass:
    relative_path: "postgresql\\pgpass.conf"
    require_noninteractive_psql: true
    require_process_pgpassword_cleared: true
    require_acl_check: true
    require_temp_appdata_dry_run: true
  connection:
    host: "127.0.0.1"
    port: 5432
    database: "k12_question_graph"
    username: "postgres"
  safety:
    do_not_modify_real_user_pgpass_in_dry_run: true
    do_not_log_password: true
    remove_temp_pgpass_after_verification: true
